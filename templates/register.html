<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account – School IT Support System</title>
  <link href="/static/css/register.css" rel="stylesheet"/>
</head>
<body>
  <div class="card">
    <div class="noise-overlay"></div>

    <header class="card__header">
      <div class="gear-icon">⚙</div>
      <h1 class="card__title">School IT Support System</h1>
    </header>

    <style>
      .register-form {
        margin-top: 20px;
      }
    </style>

    <main class="card__body">

      <div class="title-block">
        <h1 class="page-title">CREATE ACCOUNT</h1>
      </div>

      <form class="register-form">

        <div class="form-group">
          <label class="form-label">NAME</label>
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input type="text" class="form-input" name="full_name" placeholder="Enter your name" required/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">EMAIL</label>
          <div class="input-wrapper">
            <span class="input-icon">✉</span>
            <input type="email" class="form-input" name="email" placeholder="Enter your email" required/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">PASSWORD</label>
          <div class="input-wrapper">
            <span class="input-icon">🔒</span>
            <input type="password" class="form-input" name="password" placeholder="Enter your password" required/>
          </div>
        </div>

        <button type="submit" class="btn-signup">SIGN UP</button>

        <p class="login-redirect">
          Already Registered?
          <a href="/login" class="redirect-link">Log in here.</a>
        </p>

      </form>
    </main>
  </div>

  <script src="/static/auth.js"></script>
</body>
</html>
